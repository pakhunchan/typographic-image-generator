<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typographic — Word Portrait Studio</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <meta name="description"
        content="Transform photographs into beautiful typographic portraits. Fill silhouettes with your own words.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app">
        <aside class="sidebar">
            <header class="brand">
                <h1>Typographic</h1>
                <p class="tagline">Word Portrait Studio</p>
            </header>

            <div class="controls">
                <!-- Image Upload -->
                <section class="panel">
                    <h2 class="panel-label">Image</h2>
                    <input type="file" id="imageInput" accept="image/*" hidden>
                    <div class="upload-zone" id="uploadZone">
                        <div class="upload-placeholder" id="uploadPlaceholder">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                <polyline points="17 8 12 3 7 8" />
                                <line x1="12" y1="3" x2="12" y2="15" />
                            </svg>
                            <span>Drop image or click to browse</span>
                        </div>
                        <img id="previewImage" class="preview-image hidden" alt="Preview">
                    </div>
                </section>

                <!-- Words -->
                <section class="panel">
                    <div class="panel-header">
                        <h2 class="panel-label">Words</h2>
                        <button type="button" class="feature-btn" id="boldBtn" title="Feature word (Ctrl+B)">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5">
                                <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z" />
                                <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z" />
                            </svg>
                            <span>Feature</span>
                        </button>
                    </div>
                    <div id="wordsInput" class="word-editor" contenteditable="true" spellcheck="false">
                        <div class="word-line featured">LOVE</div>
                        <div class="word-line">DREAM</div>
                        <div class="word-line">WONDER</div>
                        <div class="word-line">GLOW</div>
                    </div>
                    <div class="word-meta">
                        <span class="word-count" id="wordCount">4 words (1 featured)</span>
                        <span class="word-hint">Ctrl+B to feature</span>
                    </div>
                </section>

                <!-- Settings -->
                <section class="panel">
                    <h2 class="panel-label">Settings</h2>
                    <div class="settings">
                        <div class="setting-row">
                            <label for="colorScheme">Palette</label>
                            <div class="select-with-preview">
                                <select id="colorScheme">
                                    <option value="warm_red">Warm Red</option>
                                    <option value="ocean_blue">Ocean Blue</option>
                                    <option value="forest_green">Forest Green</option>
                                    <option value="sunset">Sunset</option>
                                    <option value="monochrome">Monochrome</option>
                                    <option value="custom">Custom...</option>
                                </select>
                                <div class="color-preview" id="colorPreview"></div>
                            </div>
                        </div>

                        <div class="setting-row">
                            <label for="fontSize">Text Size</label>
                            <select id="fontSize">
                                <option value="small">Small</option>
                                <option value="medium">Medium</option>
                                <option value="large" selected>Large</option>
                            </select>
                        </div>

                        <div class="setting-row">
                            <label for="backgroundColor">Background</label>
                            <select id="backgroundColor">
                                <option value="transparent" selected>Transparent</option>
                                <option value="white">White</option>
                                <option value="black">Black</option>
                            </select>
                        </div>

                        <div class="setting-group">
                            <div class="setting-row">
                                <label for="thresholdSlider">Fill</label>
                                <div class="range-control">
                                    <input type="range" id="thresholdSlider" min="0" max="100" value="50">
                                    <span class="range-value" id="thresholdValue">50%</span>
                                </div>
                            </div>
                            <label class="toggle-label">
                                <input type="checkbox" id="invertCheckbox">
                                <span class="toggle-switch"></span>
                                <span>Invert</span>
                            </label>
                        </div>

                        <div class="custom-colors hidden" id="customColorsGroup">
                            <label>Colors</label>
                            <input type="text" id="customColors" placeholder="#FF0000, #00FF00, #0000FF">
                        </div>
                    </div>
                </section>
            </div>

            <div class="sidebar-actions">
                <button class="btn-generate" id="generateBtn">
                    <span class="btn-text">Generate</span>
                    <span class="btn-loading hidden">
                        <svg class="spinner" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none"
                                stroke-dasharray="31.4 31.4" />
                        </svg>
                        <span>Creating...</span>
                    </span>
                </button>

                <button class="btn-download hidden" id="downloadBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Download PNG
                </button>
            </div>
        </aside>

        <main class="canvas-area">
            <div class="canvas" id="resultContainer">
                <div class="canvas-placeholder" id="resultPlaceholder">
                    <div class="placeholder-content">
                        <span class="placeholder-icon">Aa</span>
                        <p>Upload an image and hit Generate<br>to create your word portrait</p>
                    </div>
                </div>
                <img id="resultImage" class="canvas-result hidden" alt="Generated typographic portrait">
            </div>
        </main>
    </div>

    <script src="app.js?v=11"></script>
</body>

</html>
